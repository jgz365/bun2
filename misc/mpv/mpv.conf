################################################################################
# mpv Configuration File
# Hardware: Intel i7-4500U | NVIDIA GeForce 840M | 8GB RAM
# OS:       Ubuntu 24.04.4 GNOME on X11 | NVIDIA PRIME Performance Mode
#
# Place this file at: ~/.config/mpv/mpv.conf
################################################################################


# ==============================================================================
# VIDEO OUTPUT & GPU
# ==============================================================================

# gpu-next is the modern Vulkan/OpenGL renderer (libplacebo-based).
# Falls back gracefully if unavailable.
vo=gpu-next

# Use OpenGL with X11. On PRIME Performance Mode the NVIDIA dGPU handles this.
# Switch to "vulkan" if you have Vulkan drivers set up (slightly more efficient).
gpu-api=opengl

# Force NVIDIA dGPU rendering on X11 PRIME. If mpv ever falls back to the iGPU,
# this overrides that. Requires the NVIDIA driver to expose the correct display.
# (Usually handled automatically by PRIME, but explicit is safer.)
# gpu-context=x11egl      # Uncomment if you see tearing or wrong GPU being used


# ==============================================================================
# HARDWARE VIDEO DECODING
# ==============================================================================

# nvdec: NVIDIA's CUDA-based HW decoder. Best choice for 840M on Linux.
# Offloads H.264, H.265, VP9 decoding to the GPU, saving CPU headroom.
hwdec=nvdec

# Fallback chain if nvdec is unavailable (e.g. codec not supported):
# vaapi uses Intel's iGPU decoder as secondary fallback.
hwdec-codecs=h264,hevc,vp9,vp8,mpeg2video,mpeg4,vc1


# ==============================================================================
# SCALING & UPSCALING
# ==============================================================================

# Balanced high-quality scaler. Not too heavy for the 840M, visibly better
# than the default (bilinear). Good for 1080p and below.
scale=spline36
cscale=spline36
dscale=mitchell

# Correct downscaling (reduces aliasing when shrinking frames).
dscale=mitchell
scale-antiring=0.6
cscale-antiring=0.6

# Debanding: reduces color banding artifacts on gradients (dark scenes, skies).
# Mild settings to keep it fast on mid-range GPU.
deband=yes
deband-iterations=2
deband-threshold=32
deband-range=16
deband-grain=24


# ==============================================================================
# COLOR & HDR
# ==============================================================================

# Correct colorspace handling. "auto" detects the video's colorspace.
target-colorspace-hint=yes

# Tone-mapping for HDR content on SDR displays.
# 840M/X11 does not support HDR passthrough, so we tone-map to SDR.
tone-mapping=bt.2446a
hdr-compute-peak=yes


# ==============================================================================
# AUDIO
# ==============================================================================

# PulseAudio is the default on Ubuntu GNOME; pipewire-pulse is a drop-in.
ao=pulse

# Normalize audio volume so all content plays at a consistent level.
af=loudnorm

# Keep audio in sync if it drifts slightly (safe default).
audio-pitch-correction=yes

# Buffer size: reduces audio dropouts without notable latency.
audio-buffer=0.2


# ==============================================================================
# PERFORMANCE & CACHE
# ==============================================================================

# Read-ahead cache for local files and network streams.
# 150MB of RAM is a comfortable amount given your 8GB.
cache=yes
demuxer-max-bytes=150MiB
demuxer-readahead-secs=30

# For network streams (YouTube via yt-dlp, etc.), larger buffer prevents stalls.
cache-pause-wait=3

# Reduce CPU wakeups between frames (saves power, smoother playback).
video-sync=display-resample

# Interpolation (motion smoothing / "smoothmotion"). Reduces judder on 24fps
# content displayed at 60Hz. Mild performance cost on 840M — disable if needed.
interpolation=yes
tscale=oversample


# ==============================================================================
# SUBTITLES
# ==============================================================================

sub-auto=fuzzy
sub-font=Noto Sans
sub-font-size=46
sub-color=1.0/1.0/1.0/1.0
sub-border-color=0.0/0.0/0.0/1.0
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color=0.0/0.0/0.0/0.4
sub-ass-override=force


# ==============================================================================
# OSD (ON-SCREEN DISPLAY)
# ==============================================================================

osd-font=Noto Sans
osd-font-size=32
osd-color=1.0/1.0/1.0/1.0
osd-border-color=0.0/0.0/0.0/1.0
osd-border-size=1.5
osd-bar=yes
osd-bar-h=2
osd-bar-w=95


# ==============================================================================
# WINDOW & BEHAVIOR
# ==============================================================================

# Remember playback position when you reopen a file.
save-position-on-quit=yes

# Keep the window open after playback ends (useful for reviewing clips).
keep-open=yes

# Start in a reasonably sized window rather than fullscreen.
autofit=85%x85%

# Don't allow the video window to exceed screen boundaries.
autofit-larger=100%x100%

# Show filename in window title.
title=${filename}

# Screenshot format and location.
screenshot-format=png
screenshot-png-compression=7
screenshot-directory=/home/jgz365/Desktop/journey-to-the-Cnter/C-Shots


# ==============================================================================
# PROFILES
# ==============================================================================

# --- High-quality profile (manual: mpv --profile=hq <file>) ---
[hq]
profile-desc="High Quality - heavier GPU load"
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
deband-iterations=4
deband-threshold=48
interpolation=yes
tscale=mitchell

# --- Low-power profile (manual: mpv --profile=lowpower <file>) ---
[lowpower]
profile-desc="Low Power - minimal GPU/CPU usage"
hwdec=nvdec
vo=gpu
scale=bilinear
cscale=bilinear
deband=no
interpolation=no
cache=no

# --- Network/streaming profile ---
[stream]
profile-desc="Network streams - larger cache, no interpolation"
cache=yes
demuxer-max-bytes=300MiB
demuxer-readahead-secs=60
interpolation=no
