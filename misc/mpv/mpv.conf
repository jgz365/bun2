vo=gpu-next
gpu-api=opengl
hwdec=nvdec
hwdec-codecs=h264,hevc,vp9,vp8,mpeg2video,mpeg4,vc1
scale=spline36
cscale=spline36
dscale=mitchell
scale-antiring=0.6
cscale-antiring=0.6
deband=yes
deband-iterations=2
deband-threshold=32
deband-range=16
deband-grain=24
target-colorspace-hint=yes
tone-mapping=bt.2446a
hdr-compute-peak=yes
ao=pulse
af=loudnorm
audio-pitch-correction=yes
audio-buffer=0.2
cache=yes
demuxer-max-bytes=150MiB
demuxer-readahead-secs=30
cache-pause-wait=3
video-sync=display-resample
interpolation=yes
tscale=oversample
sub-auto=fuzzy
sub-font=Noto Sans
sub-font-size=46
sub-color=1.0/1.0/1.0/1.0
sub-border-color=0.0/0.0/0.0/1.0
sub-border-size=2.5
sub-shadow-offset=1
sub-shadow-color=0.0/0.0/0.0/0.4
sub-ass-override=force

osd-font=Noto Sans
osd-font-size=32
osd-color=1.0/1.0/1.0/1.0
osd-border-color=0.0/0.0/0.0/1.0
osd-border-size=1.5
osd-bar=yes
osd-bar-h=2
osd-bar-w=95

save-position-on-quit=yes
keep-open=yes
autofit=85%x85%
autofit-larger=100%x100%
title=${filename}
screenshot-format=png
screenshot-png-compression=7
screenshot-directory=

[hq]
profile-desc="High Quality"
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
deband-iterations=4
deband-threshold=48
interpolation=yes
tscale=mitchell
[lowpower]
profile-desc="Low Power"
hwdec=nvdec
vo=gpu
scale=bilinear
cscale=bilinear
deband=no
interpolation=no
cache=no

[stream]
profile-desc="Network streams"
cache=yes
demuxer-max-bytes=300MiB
demuxer-readahead-secs=60
interpolation=no
